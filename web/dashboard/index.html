<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Cricket Intelligence Lab</title>
<style>
 :root{
  --base:#06080D;--panel:#0D121C;--panel2:#141C2A;--panel3:#1A2536;--hair:#1F2A3B;--hair2:#2C3A50;
  --ink:#ECF2FC;--muted:#8492AB;--dim:#5A6884;
  --accent:#3D8BFF;--accent2:#6FB0FF;--violet:#9B7BFF;--teal:#2BD4B6;--amber:#FFB454;
  --pos:#33D17A;--neg:#FF6B7E;--gold:#F0C040;
  --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
 }
 *{box-sizing:border-box}
 html,body{margin:0;min-height:100%;background:
   radial-gradient(1300px 780px at 84% -12%,rgba(124,92,255,.34),transparent 58%),
   radial-gradient(1150px 720px at -8% 2%,rgba(46,118,255,.20),transparent 55%),
   radial-gradient(1000px 760px at 60% 122%,rgba(34,206,190,.15),transparent 60%),
   radial-gradient(860px 600px at 10% 86%,rgba(255,72,150,.14),transparent 62%),
   linear-gradient(165deg,#0F1124 0%,#0B0D18 46%,#070810 100%);background-attachment:fixed;
   color:var(--ink);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;font-size:13.5px;line-height:1.5}
 a{color:var(--accent2);text-decoration:none;cursor:pointer}
 .num{font-variant-numeric:tabular-nums;font-family:var(--mono)}
 .wrap{max-width:1340px;margin:0 auto;padding:0 22px 110px;position:relative;z-index:1}
 header{position:sticky;top:0;z-index:40;background:linear-gradient(180deg,rgba(8,12,20,.92),rgba(6,8,13,.7));backdrop-filter:blur(22px) saturate(1.6);border-bottom:1px solid transparent}
 header::before{content:"";position:absolute;inset:0;pointer-events:none;opacity:.5;
   background:radial-gradient(420px 120px at 18% 0,rgba(61,139,255,.16),transparent 70%),radial-gradient(420px 120px at 72% 0,rgba(155,123,255,.12),transparent 70%),radial-gradient(340px 110px at 95% 0,rgba(43,212,182,.10),transparent 70%)}
 header::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:1.5px;background:linear-gradient(90deg,transparent,rgba(61,139,255,.9),rgba(155,123,255,.7),rgba(43,212,182,.6),transparent);background-size:220% 100%;animation:sheen 6s linear infinite}
 @keyframes sheen{from{background-position:0 0}to{background-position:220% 0}}
 .hbar{max-width:1340px;margin:0 auto;padding:11px 22px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:relative}
 .livepill{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--teal);background:rgba(43,212,182,.08);border:1px solid rgba(43,212,182,.25);padding:4px 9px;border-radius:999px}
 .livepill .dotled{width:6px;height:6px;border-radius:50%;background:var(--teal);box-shadow:0 0 0 0 rgba(43,212,182,.6);animation:pulse 1.8s infinite}
 @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(43,212,182,.55)}70%{box-shadow:0 0 0 6px rgba(43,212,182,0)}100%{box-shadow:0 0 0 0 rgba(43,212,182,0)}}
 .brand{display:flex;align-items:center;gap:10px;cursor:pointer;white-space:nowrap}
 .mark{width:30px;height:30px;filter:drop-shadow(0 0 10px rgba(61,139,255,.7));transition:transform .6s;animation:floaty 5s ease-in-out infinite}
 @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
 .brand:hover .mark{transform:rotate(180deg)}
 .logo{font-weight:800;letter-spacing:-.02em;font-size:15.5px}
 .logo b{background:linear-gradient(90deg,#86C0FF,#3D8BFF);-webkit-background-clip:text;background-clip:text;color:transparent}
 .logo .dot{color:var(--teal)}
 select,input,button{font-family:inherit}
 .cwrap,.swrap{display:flex;align-items:center;gap:6px;background:var(--panel2);border:1px solid var(--hair2);border-radius:10px;padding:0 9px;transition:.15s}
 .cwrap:focus-within,.swrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(61,139,255,.18)}
 .cwrap svg,.swrap svg{width:14px;height:14px;color:var(--dim);flex:none}
 .cwrap select,.swrap input{background:transparent;border:none;padding:9px 4px;font-size:12.5px;color:var(--ink);outline:none}
 .cwrap select{font-weight:600;max-width:260px} select option,optgroup{background:#0D121C;color:var(--ink)}
 .ctrl select,.ctrl input,.row select,.pg select{background:var(--panel2);color:var(--ink);border:1px solid var(--hair2);border-radius:8px;padding:7px 10px;font-size:12.5px;outline:none}
 nav{display:flex;gap:2px;flex-wrap:wrap;margin-left:auto;background:var(--panel);border:1px solid var(--hair);border-radius:12px;padding:3px}
 nav button{background:transparent;color:var(--muted);border:none;border-radius:9px;padding:7px 13px;font-size:12.5px;cursor:pointer;font-weight:600;transition:.15s}
 nav button:hover{color:var(--ink);background:var(--panel2)}
 nav button.active{color:#fff;background:linear-gradient(135deg,var(--accent2),var(--accent) 60%,var(--violet));box-shadow:0 8px 22px -8px var(--accent),inset 0 1px 0 rgba(255,255,255,.25)}
 @keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
 #app>*{animation:fadeUp .3s ease both}
 h1{font-size:24px;margin:22px 0 3px;letter-spacing:-.02em;font-weight:760;background:linear-gradient(90deg,#fff,#c7d6ee);-webkit-background-clip:text;background-clip:text;color:transparent}
 .sub{color:var(--muted);font-size:13px;margin:0 0 16px}
 .grid{display:grid;gap:13px}.bento{grid-template-columns:repeat(12,1fr)}
 .s3{grid-column:span 3}.s4{grid-column:span 4}.s5{grid-column:span 5}.s6{grid-column:span 6}.s7{grid-column:span 7}.s8{grid-column:span 8}.s12{grid-column:span 12}
 @media(max-width:980px){.s3,.s4,.s5,.s6,.s7,.s8{grid-column:span 12}}
 .panel{background:linear-gradient(180deg,var(--panel),#0A0F18);border:1px solid var(--hair);border-radius:14px;padding:15px;transition:border-color .15s,box-shadow .15s,transform .15s}
 .panel:hover{border-color:var(--hair2);box-shadow:0 14px 40px -26px rgba(61,139,255,.6)}
 .panel h2{color:var(--muted);text-transform:uppercase;font-size:10.5px;letter-spacing:.11em;font-weight:700;margin:0 0 12px;display:flex;justify-content:space-between;align-items:center}
 .panel h2 .r{color:var(--dim);font-weight:600;letter-spacing:.04em;text-transform:none}
 .kpi .n{font-size:27px;font-weight:780;letter-spacing:-.02em;background:linear-gradient(180deg,#fff,#a9c8ff);-webkit-background-clip:text;background-clip:text;color:transparent}
 .kpi .l{color:var(--muted);font-size:10.5px;text-transform:uppercase;letter-spacing:.07em}
 .kpi .s{color:var(--dim);font-size:11px}
 table{width:100%;border-collapse:collapse;font-size:12.5px}
 th,td{text-align:left;padding:11px 13px;border-bottom:1px solid var(--hair);white-space:nowrap}
 td.n,th.n{text-align:right;font-variant-numeric:tabular-nums;font-family:var(--mono)}
 th{color:var(--dim);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.09em;cursor:pointer;user-select:none;position:static;top:auto;background:transparent;border-bottom:1px solid var(--hair2)}
 th:hover{color:var(--muted)}
 tbody tr{transition:background .1s}
 tbody tr:hover{background:rgba(201,162,74,.06)} tr.cl{cursor:pointer}
 tbody tr:nth-child(even){background:rgba(255,255,255,.02)}
 tbody td:first-child{font-weight:600}
 .rankpick{position:relative;display:inline-flex;align-items:center}
 .rankpick select{appearance:none;-webkit-appearance:none;background:var(--panel2);border:1px solid var(--hair2);border-radius:9px;padding:9px 34px 9px 14px;font-size:13px;color:var(--ink);font-weight:600;cursor:pointer;outline:none;min-width:250px}
 .rankpick .chev{position:absolute;right:12px;width:14px;height:14px;color:#C9A24A;pointer-events:none}
 .bar{height:7px;background:var(--panel3);border-radius:5px;overflow:hidden}
 .bar>span{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transform-origin:left;animation:barIn .7s cubic-bezier(.2,.8,.2,1) both}
 @keyframes barIn{from{transform:scaleX(0)}to{transform:scaleX(1)}}
 .pctrow{display:grid;grid-template-columns:128px 1fr 38px;gap:9px;align-items:center;margin:7px 0}
 .pctrow .k{color:var(--muted);font-size:11.5px}.pctrow .v{text-align:right}
 .muted{color:var(--muted)}.dim{color:var(--dim)}.pos{color:var(--pos)}.neg{color:var(--neg)}.gold{color:var(--gold)}
 .arch{font-size:10px;padding:2px 8px;border-radius:6px;font-weight:700;letter-spacing:.02em;white-space:nowrap}
 .badge{font-size:9.5px;padding:1px 6px;border-radius:5px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;background:var(--panel3);color:var(--dim)}
 .cov{background:linear-gradient(90deg,rgba(255,180,84,.10),transparent);border:1px solid var(--hair2);border-left:3px solid var(--amber);border-radius:10px;padding:10px 13px;font-size:12px;color:var(--muted);margin:12px 0}
 .cov b{color:var(--ink)}
 .hero{position:relative;overflow:hidden;border:1px solid var(--hair);border-radius:18px;padding:28px;
   background:linear-gradient(120deg,rgba(61,139,255,.17),rgba(155,123,255,.07) 45%,rgba(10,15,24,.4) 70%),var(--panel);margin-top:18px}
 .hero h1{margin:0 0 6px;font-size:32px;background:linear-gradient(90deg,#fff 24%,#86C0FF);-webkit-background-clip:text;background-clip:text;color:transparent}
 .hero .tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
 .tag{font-size:11px;padding:4px 11px;border-radius:8px;background:rgba(255,255,255,.05);border:1px solid var(--hair2);color:var(--muted)}
 .tag b{color:var(--ink)}
 .hero::before{content:"";position:absolute;inset:0;pointer-events:none;
   background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
   background-size:30px 30px;-webkit-mask:radial-gradient(circle at 78% -10%,#000,transparent 70%);mask:radial-gradient(circle at 78% -10%,#000,transparent 70%)}
 .hero>*{position:relative;z-index:1}
 .cohort-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px;margin-top:14px}
 .ccard{position:relative;overflow:hidden;background:var(--panel);border:1px solid var(--hair);border-radius:13px;padding:15px;cursor:pointer;transition:.16s}
 .ccard:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 12px 32px -16px var(--accent)}
 .ccard .t{font-weight:700;font-size:14px;margin-bottom:5px}
 .ccard .m{color:var(--dim);font-size:11px}
 .ccard .fmtpill{position:absolute;top:12px;right:12px;font-size:9px;font-weight:800;letter-spacing:.05em;padding:2px 7px;border-radius:6px}
 .ccard::after{content:"";position:absolute;top:0;left:-60%;width:40%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.07),transparent);transition:left .5s}
 .ccard:hover::after{left:120%}
 .ccard.on{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}
 .ledrow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--hair);gap:8px}
 .ledrow:last-child{border:none}
 .rank{display:inline-flex;align-items:center;justify-content:center;width:21px;height:21px;border-radius:6px;font-size:10.5px;font-weight:800;font-family:var(--mono);background:var(--panel3);color:var(--dim);flex:none}
 .rank.r1{background:linear-gradient(180deg,#F7D774,#E0A100);color:#1a1500}
 .rank.r2{background:linear-gradient(180deg,#D7E0EC,#9AA8BD);color:#10151f}
 .rank.r3{background:linear-gradient(180deg,#E0A270,#B26A36);color:#1a0d00}
 .minibar{display:grid;grid-template-columns:140px 1fr 56px;gap:8px;align-items:center;margin:5px 0;font-size:12px}
 .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
 .pill{font-size:11px;padding:4px 10px;border-radius:7px;background:var(--panel2);color:var(--muted);border:1px solid var(--hair2);cursor:pointer}
 .pill:hover{color:var(--ink);border-color:var(--hair2)}
 .pill.on{background:var(--accent);color:#fff;border-color:var(--accent)}
 .note{font-size:11px;color:var(--dim);font-style:italic}
 .ac{position:relative}
 .aclist{position:absolute;z-index:30;background:var(--panel2);border:1px solid var(--hair2);border-radius:9px;margin-top:4px;max-height:300px;overflow:auto;min-width:250px}
 .aclist div{padding:7px 11px;cursor:pointer;font-size:12.5px}.aclist div:hover{background:var(--accent)}
 .tooltip{position:fixed;pointer-events:none;background:#0a1220;border:1px solid var(--hair2);border-radius:9px;padding:8px 11px;font-size:11.5px;z-index:60;display:none;box-shadow:0 10px 30px rgba(0,0,0,.65)}
 .legend{display:flex;gap:13px;flex-wrap:wrap;font-size:11px;color:var(--muted);margin-top:8px}
 .sw{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:5px;vertical-align:middle}
 .ctrl{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:13px}
 .ctrl label{font-size:11px;color:var(--muted);display:flex;flex-direction:column;gap:4px}
 /* pagination */
 .pg{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:12px;flex-wrap:wrap}
 .pg .pages{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
 .pg button{background:var(--panel2);border:1px solid var(--hair2);color:var(--muted);border-radius:8px;padding:6px 11px;font-size:12px;cursor:pointer;font-weight:600;font-variant-numeric:tabular-nums}
 .pg button:hover:not(:disabled){color:var(--ink);border-color:var(--accent)}
 .pg button.cur{background:var(--accent);color:#fff;border-color:var(--accent)}
 .pg button:disabled{opacity:.35;cursor:default}
 .pg .info{font-size:11.5px;color:var(--dim)}
 .pgmini{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-top:9px;border-top:1px solid var(--hair);padding-top:8px}
 .pgmini button{background:transparent;border:1px solid var(--hair2);color:var(--muted);border-radius:7px;width:26px;height:24px;cursor:pointer;font-size:13px;line-height:1}
 .pgmini button:hover:not(:disabled){color:var(--ink);border-color:var(--accent)}
 .pgmini button:disabled{opacity:.3;cursor:default}
 .pgmini .lab{font-size:10.5px;color:var(--dim);font-family:var(--mono)}
 .scatter-pt{cursor:pointer;transition:r .1s}.scatter-pt:hover{r:7}
 .flagchip{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--hair)}
 .loadbox{display:flex;flex-direction:column;align-items:center;gap:14px;padding:80px 0;color:var(--muted)}
 .spinner{width:38px;height:38px;border:3px solid var(--hair2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
 @keyframes spin{to{transform:rotate(360deg)}}
 ::selection{background:rgba(61,139,255,.35)}
 ::-webkit-scrollbar{width:11px;height:11px}
 ::-webkit-scrollbar-thumb{background:#1F2A3B;border-radius:7px;border:3px solid var(--base)}
 ::-webkit-scrollbar-thumb:hover{background:#2C3A50}
 footer{color:var(--dim);font-size:11.5px;text-align:center;margin-top:46px;padding-top:20px;border-top:1px solid var(--hair)}

 /* toolbar & filter controls */
 .toolbar{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;margin-bottom:14px}
 .field{display:flex;flex-direction:column;gap:5px}
 .flab{font-size:9.5px;text-transform:uppercase;letter-spacing:.09em;color:var(--dim);font-weight:700}
 .swrap2{display:flex;align-items:center;background:var(--panel2);border:1px solid var(--hair2);border-radius:9px;padding:0 11px;transition:.15s}
 .swrap2 input{background:transparent;border:none;outline:none;color:var(--ink);padding:9px 2px;font-size:12.5px;width:210px}
 .swrap2:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(61,139,255,.16)}
 .selwrap{position:relative;display:inline-flex}
 .selwrap select{appearance:none;-webkit-appearance:none;background:var(--panel2);border:1px solid var(--hair2);border-radius:9px;padding:9px 32px 9px 12px;font-size:12.5px;color:var(--ink);outline:none;cursor:pointer;font-weight:600;min-width:140px}
 .selwrap::after{content:"▾";position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--dim);pointer-events:none;font-size:10px}
 .selwrap select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(61,139,255,.16)}
 .seg{display:inline-flex;border:1px solid var(--hair2);border-radius:9px;overflow:hidden;background:var(--panel2)}
 .seg button{background:transparent;border:none;color:var(--muted);padding:9px 14px;font-size:12px;cursor:pointer;font-weight:600;transition:.12s}
 .seg button:not(:last-child){border-right:1px solid var(--hair2)}
 .seg button.on{background:linear-gradient(180deg,var(--accent2),var(--accent));color:#fff}
 .count{font-size:11.5px;color:var(--dim);margin-left:auto;align-self:center;font-variant-numeric:tabular-nums}
 .tablewrap{overflow-x:auto}
 .tablewrap table{min-width:680px}
 /* header two-row layout */
 .htools{display:flex;gap:10px;align-items:center;margin-left:auto}
 .navbar{max-width:1340px;margin:0 auto;padding:0 22px 9px;display:flex}
 .navbar nav{margin-left:0;width:100%;overflow-x:auto}
 @media(max-width:1100px){ .swrap2 input{width:150px} .cwrap select{max-width:190px} }
 @media(max-width:760px){ .htools{margin-left:0;width:100%} .navbar{padding-bottom:8px} }
.avatar{position:relative;width:62px;height:62px;border-radius:14px;overflow:hidden;flex:none;background:linear-gradient(135deg,var(--panel3),var(--panel2));border:1px solid var(--hair2);display:flex;align-items:center;justify-content:center}
 .avatar img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
 .avini{font-weight:800;font-size:22px;color:var(--accent2);font-family:var(--mono)}
 /* clickable live match cards */
 .mcard.cl{cursor:pointer}
 .mcard.cl:hover{border-color:var(--accent);box-shadow:0 10px 30px -14px var(--accent)}
 /* schedule grouped-by-date */
 .schd{margin-top:14px;display:flex;flex-direction:column;gap:18px}
 .schd-date{font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--accent2);margin-bottom:8px;padding-bottom:7px;border-bottom:1px solid var(--hair)}
 .schd-row{display:grid;grid-template-columns:64px 1fr auto;gap:14px;align-items:center;padding:11px 13px;border:1px solid var(--hair);border-radius:11px;background:linear-gradient(180deg,var(--panel),#0A0F18);margin-bottom:8px;transition:.14s}
 .schd-row:hover{border-color:var(--hair2);transform:translateX(2px)}
 .schd-time{font-weight:700;color:var(--ink)}
 .schd-title{font-weight:650}
 .schd-sub{font-size:11.5px;margin-top:2px}
 .schd-venue{font-size:11.5px;text-align:right;max-width:280px}
 @media(max-width:760px){ .schd-row{grid-template-columns:54px 1fr} .schd-venue{display:none} }
 /* rankings category selector + table */
 .rsel{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px}
 .rtbl th{position:static;top:auto}
 /* ===== intelligence homepage ===== */
 .pitchbg{position:fixed;inset:0;width:100vw;height:100vh;z-index:0;pointer-events:none;opacity:.045}
 .term{position:relative;border:1px solid var(--hair);border-radius:16px;padding:22px 24px;margin-top:18px;overflow:hidden;
   background:linear-gradient(135deg,rgba(61,139,255,.12),rgba(155,123,255,.06) 46%,rgba(10,15,24,.35)),var(--panel)}
 .term-kic{font-family:var(--mono);font-size:21px;font-weight:800;letter-spacing:.05em;background:linear-gradient(90deg,#fff,#86C0FF);-webkit-background-clip:text;background-clip:text;color:transparent}
 .term-sub{color:var(--muted);font-size:12.5px;margin-top:4px}
 .fstats{display:flex;flex-wrap:wrap;gap:24px 30px;margin-top:16px}
 .fstat .fsv{font-size:22px;font-weight:780;letter-spacing:-.02em;color:var(--ink)}
 .fstat .fsl{font-size:9.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--dim);margin-top:1px}
 .insight{position:relative;margin-top:14px;border:1px solid var(--hair2);border-left:3px solid var(--amber);border-radius:13px;padding:15px 18px;cursor:pointer;transition:.15s;
   background:linear-gradient(120deg,rgba(255,180,84,.11),transparent 62%),var(--panel)}
 .insight:hover{border-color:var(--amber);transform:translateY(-1px)}
 .ins-tag{font-family:var(--mono);font-size:10px;font-weight:800;letter-spacing:.16em;color:var(--amber)}
 .ins-name{font-size:19px;font-weight:760;margin:3px 0 4px}
 .ins-line{color:var(--muted);font-size:13.5px;max-width:780px;line-height:1.55}
 .sechead{margin:22px 0 10px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700}
 .disc{display:grid;grid-template-columns:repeat(auto-fill,minmax(192px,1fr));gap:11px}
 .dcard{border:1px solid var(--hair);border-radius:12px;padding:13px 14px;cursor:pointer;transition:.15s;background:linear-gradient(180deg,var(--panel),#0A0F18)}
 .dcard:hover,.dcard.on{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 12px 30px -16px var(--accent)}
 .dcard .dic{color:var(--muted);height:16px;line-height:0}
 .dic-svg{vertical-align:-3px}
 .trh .dic-svg,.dtop .dic-svg{vertical-align:-2px}
 .dcard .dt{font-weight:720;font-size:13.5px;margin-top:6px}

/* ---------- generic pagination ---------- */
function paginate(rows,renderRows,opts){
  opts=opts||{};const per=opts.per||20;let page=opts.page||0;
  const wrap=$('<div></div>');const body=$('<div></div>');const pgbar=$('<div class="pg"></div>');
  wrap.appendChild(body);wrap.appendChild(pgbar);
  function draw(){
    const total=rows.length,pages=Math.max(1,Math.ceil(total/per));page=Math.min(page,pages-1);
    body.innerHTML='';body.appendChild(renderRows(rows.slice(page*per,page*per+per),page*per));
    const win=[];const a=Math.max(0,page-2),b=Math.min(pages-1,page+2);
    if(a>0)win.push(0);if(a>1)win.push('…');for(let i=a;i<=b;i++)win.push(i);
    if(b<pages-2)win.push('…');if(b<pages-1)win.push(pages-1);
    pgbar.innerHTML=`<span class="info">${total.toLocaleString()} rows · page ${page+1}/${pages}</span><div class="pages"></div>`;
    const pc=pgbar.querySelector('.pages');
    const mk=(lab,pg,dis,cur)=>{const btn=document.createElement('button');btn.textContent=lab;btn.disabled=dis;if(cur)btn.className='cur';if(!dis&&pg!=null)btn.onclick=()=>{page=pg;draw();window.scrollTo({top:wrap.getBoundingClientRect().top+window.scrollY-90,behavior:'smooth'});};return btn;};
    pc.appendChild(mk('‹',page-1,page===0));
    win.forEach(w=>{if(w==='…'){const s=document.createElement('span');s.textContent='…';s.style.color='var(--dim)';s.style.padding='0 4px';pc.appendChild(s);}else pc.appendChild(mk(w+1,w,false,w===page));});
    pc.appendChild(mk('›',page+1,page>=pages-1));
  }
  draw();return wrap;
}

/* ---------- aligned sortable + paginated table (single <table>) ---------- */
function dataTable(opts){
  let sk=opts.sortKey,desc=opts.sortDesc!==false,page=0;const per=opts.per||25;
  const getv=opts.getVal||((r,k)=>r[k]);
  const wrap=$('<div class="tablewrap"></div>');const tbl=document.createElement('table');const pgbar=$('<div class="pg"></div>');
  wrap.appendChild(tbl);wrap.appendChild(pgbar);let rows=opts.rows.slice();
  function sortRows(){const r=rows.slice();r.sort((a,b)=>{let x=getv(a,sk),y=getv(b,sk);
    if(typeof x==='string'||typeof y==='string'){x=String(getv(a,sk)??'');y=String(getv(b,sk)??'');return desc?y.localeCompare(x):x.localeCompare(y);}
    x=(x==null?-Infinity:x);y=(y==null?-Infinity:y);return desc?y-x:x-y;});return r;}
  function draw(){
    const r=sortRows();const pages=Math.max(1,Math.ceil(r.length/per));page=Math.min(page,pages-1);
    const head='<thead><tr>'+opts.cols.map(c=>`<th class="${c[2]?'n':''}" data-k="${c[0]}">${c[1]}${c[0]===sk?(desc?' ▾':' ▴'):''}</th>`).join('')+'</tr></thead>';
    const slice=r.slice(page*per,page*per+per);
    const body='<tbody>'+(slice.length?slice.map((row,i)=>opts.rowHTML(row,page*per+i)).join(''):`<tr><td colspan="${opts.cols.length}" class="note" style="padding:18px">${opts.empty||'nothing here'}</td></tr>`)+'</tbody>';
    tbl.innerHTML=head+body;
    tbl.querySelectorAll('th').forEach(th=>th.onclick=()=>{const k=th.dataset.k;if(k===sk)desc=!desc;else{sk=k;desc=((opts.cols.find(c=>c[0]===k)||[])[2]===1);}page=0;draw();});
    if(opts.onRow){const trs=tbl.querySelectorAll('tbody tr');slice.forEach((row,i)=>{if(trs[i])opts.onRow(row,trs[i]);});}
    if(opts.afterDraw)opts.afterDraw(tbl);
    const win=[];const a=Math.max(0,page-2),b=Math.min(pages-1,page+2);
    if(a>0)win.push(0);if(a>1)win.push('…');for(let i=a;i<=b;i++)win.push(i);if(b<pages-2)win.push('…');if(b<pages-1)win.push(pages-1);
    pgbar.innerHTML=`<span class="info">${r.length.toLocaleString()} rows · page ${page+1}/${pages}</span><div class="pages"></div>`;
    const pc=pgbar.querySelector('.pages');
    const mk=(lab,pg,dis,cu)=>{const btn=document.createElement('button');btn.textContent=lab;btn.disabled=dis;if(cu)btn.className='cur';if(!dis&&pg!=null)btn.onclick=()=>{page=pg;draw();wrap.scrollIntoView({behavior:'smooth',block:'start'});};return btn;};
    pc.appendChild(mk('‹',page-1,page===0));
    win.forEach(wv=>{if(wv==='…'){const sp=document.createElement('span');sp.textContent='…';sp.style.cssText='color:var(--dim);padding:0 4px';pc.appendChild(sp);}else pc.appendChild(mk(wv+1,wv,false,wv===page));});
    pc.appendChild(mk('›',page+1,page>=pages-1));
  }
  draw();
  return {el:wrap,setRows(nr){rows=nr.slice();page=0;draw();}};
}

const _boardCache={};
function _credRef(fmt,kind){fmt=(fmt||'').toLowerCase();
  if(kind==='bowl')return fmt==='test'?3000:fmt==='odi'?1800:900;
  return fmt==='test'?5000:fmt==='odi'?3500:1800;}
function cred(p,fmt,kind){const b=(p&&p.balls)||0,ref=_credRef(fmt,kind);return b/(b+ref);}
function _board(c,kind,field,dir,need){
  const fmt=c.meta.format;
  const ck=`${state.cohort}|${kind}|${field}|${dir}`;
  if(_boardCache[ck])return _boardCache[ck];
  const src=kind==='bowl'?(c.bowlers||{}):(c.players||{});
  const volKey=kind==='bowl'?'wickets':'runs';
  let pool=Object.entries(src).filter(([id,p])=>p.qualified&&!_isId(p.name)&&p[field]!=null&&(!need||(p[need]||0)>0))
    .sort((a,b)=>(b[1][volKey]||0)-(a[1][volKey]||0)).slice(0,160);
  const vals=pool.map(([id,p])=>p[field]);const mean=vals.reduce((a,b)=>a+b,0)/(vals.length||1);
  const rows=pool.map(([id,p])=>{const cr=cred(p,fmt,kind);return {pid:id,name:p.name,value:p[field],adj:mean+(p[field]-mean)*cr*cr};});
  rows.sort((a,b)=>dir==='asc'?a.adj-b.adj:b.adj-a.adj);
  return (_boardCache[ck]=rows);
}

    const xi1=cx+ir*Math.cos(b),yi1=cy+ir*Math.sin(b),xi2=cx+ir*Math.cos(a),yi2=cy+ir*Math.sin(a);
    const large=ang>Math.PI?1:0;
    svg+=`<path d="M${x1},${y1} A${r},${r} 0 ${large} 1 ${x2},${y2} L${xi1},${yi1} A${ir},${ir} 0 ${large} 0 ${xi2},${yi2} Z" fill="${ARCH_COLOR[k]||'#888'}"/>`;a=b;});
  svg+=`<text x="${cx}" y="${cy-2}" text-anchor="middle" fill="#ECF2FC" font-size="15" font-weight="700" font-family="var(--mono)">${total}</text><text x="${cx}" y="${cy+12}" text-anchor="middle" fill="#8492AB" font-size="8" letter-spacing="1">RATED</text></svg>`;
  return `<div style="display:flex;flex-direction:column;align-items:center;gap:10px;padding-top:4px">${svg}<div class="legend" style="justify-content:center">${entries.map(([k,v])=>`<span><span class="sw" style="background:${ARCH_COLOR[k]||'#888'}"></span>${k} ${v}</span>`).join('')}</div></div>`;
}

function radar(players,axes,cols){
  const N=axes.length,cx=150,cy=145,R=108,ang=i=>(-Math.PI/2)+i*2*Math.PI/N;
  let svg=`<svg viewBox="0 0 300 290" width="100%" style="max-width:330px">`;
  for(let g=1;g<=4;g++){let pts='';for(let i=0;i<N;i++){const r=R*g/4;pts+=`${cx+r*Math.cos(ang(i))},${cy+r*Math.sin(ang(i))} `;}svg+=`<polygon points="${pts}" fill="none" stroke="#1F2A3B"/>`;}
  for(let i=0;i<N;i++){svg+=`<line x1="${cx}" y1="${cy}" x2="${cx+R*Math.cos(ang(i))}" y2="${cy+R*Math.sin(ang(i))}" stroke="#1F2A3B"/><text x="${cx+(R+15)*Math.cos(ang(i))}" y="${cy+(R+15)*Math.sin(ang(i))}" fill="#8492AB" font-size="9.5" text-anchor="middle">${axes[i][1]}</text>`;}
  players.forEach((p,pi)=>{let pts='';for(let i=0;i<N;i++){const v=(p.pct&&p.pct[axes[i][0]]!=null?p.pct[axes[i][0]]:50)/100;pts+=`${cx+R*v*Math.cos(ang(i))},${cy+R*v*Math.sin(ang(i))} `;}svg+=`<polygon points="${pts}" fill="${cols[pi]}22" stroke="${cols[pi]}" stroke-width="2"/>`;});
  return svg+`</svg><div class="legend">${players.map((p,i)=>`<span><span class="sw" style="background:${cols[i]}"></span>${esc(p.name)}</span>`).join('')}</div>`;
}

        <div class="grid bento" style="margin-top:10px">${[["Balls",m.balls],["Runs",m.runs],["Dismissals",m.outs],["Strike Rate",m.sr],["Average",m.avg]].map(t=>`<div class="s4"><div class="kpi"><div class="l">${t[0]}</div><div class="n">${fmtN(t[1])}</div></div></div>`).join('')}</div></div></div>`;return;}

function matchTable(rows){
  return paginate(rows,(slice)=>{

    setTimeout(()=>wirePlinks(t),0);return t;
  },{per:20});
}

/* ================= RESEARCH LAB ================= */
function researchView(app){
  const c=cur();
  app.appendChild($(`<div><h1>Research Lab</h1><p class="sub">Plot any metric against any other. Defaults to <b>established</b> batters (credible sample) so small-sample associates don't dominate — switch <b>Tier</b> to Fringe to study them separately. Players far from the trend line are flagged as outliers (looser threshold for the smaller Established pool).</p></div>`));
  const opts=METRICS.map(m=>`<option value="${m[0]}">${m[1]}</option>`).join('');
  const archs=[...new Set(Object.values(c.players).map(p=>p.archetype).filter(Boolean))];
  const ctrl=$(`<div class="panel"><div class="ctrl">
    <label>X axis<select id="rx">${opts}</select></label>
    <label>Y axis<select id="ry">${opts}</select></label>
    <label>Min balls<input id="rmin" type="number" value="${c.meta.rate_min_bat}" style="width:90px"/></label>
    <label>Archetype<select id="rarch"><option value="">All</option>${archs.map(a=>`<option>${a}</option>`).join('')}</select></label>
    <label>Tier<select id="rtier"><option value="established">Established</option><option value="fringe">Fringe / associate</option><option value="all">All players</option></select></label>
    <label>Color<select id="rcol"><option value="arch">By archetype</option><option value="flag">Outliers only</option></select></label>
  </div><div class="grid bento"><div class="panel s8" id="rsc" style="background:#080d15"></div><div class="panel s4"><h2>Flagged outliers <span class="r" id="rflagn"></span></h2><div id="rflag"></div><div id="rflagpg" class="pgmini" style="margin-top:10px;justify-content:center"></div></div></div></div>`);
  app.appendChild(ctrl);
  ctrl.querySelector('#rx').value='avg';ctrl.querySelector('#ry').value='sr';
  function draw(){
    const xk=ctrl.querySelector('#rx').value,yk=ctrl.querySelector('#ry').value;
    const minb=+ctrl.querySelector('#rmin').value||0,fa=ctrl.querySelector('#rarch').value,col=ctrl.querySelector('#rcol').value;
    const tier=ctrl.querySelector('#rtier').value,fmt=c.meta.format,CT=0.45;
    let pts=Object.entries(c.players).filter(([id,p])=>p.balls>=minb&&!_isId(p.name)&&(!fa||p.archetype===fa)&&(tier==='all'||((cred(p,fmt,'bat')>=CT)===(tier==='established'))))
      .map(([id,p])=>({pid:id,name:p.name,arch:p.archetype,x:mval(p,xk),y:mval(p,yk)})).filter(p=>p.x!=null&&p.y!=null);
    const xs=pts.map(p=>p.x),ys=pts.map(p=>p.y),n=pts.length;
    let slope=0,inter=ys.reduce((a,b)=>a+b,0)/(n||1);
    if(n>=6){const mx=xs.reduce((a,b)=>a+b,0)/n,my=ys.reduce((a,b)=>a+b,0)/n;let sxy=0,sxx=0;for(let i=0;i<n;i++){sxy+=(xs[i]-mx)*(ys[i]-my);sxx+=(xs[i]-mx)**2;}slope=sxx?sxy/sxx:0;inter=my-slope*mx;}
    const resid=pts.map(p=>p.y-(slope*p.x+inter));const rm=resid.reduce((a,b)=>a+b,0)/(n||1);
    const rsd=Math.sqrt(resid.reduce((a,b)=>a+(b-rm)**2,0)/(n||1))||1;
    const FZ=tier==='established'?1.5:2.4;
    pts.forEach((p,i)=>{p.z=+((resid[i]-rm)/rsd).toFixed(2);p.flag=Math.abs(p.z)>FZ;});
    ctrl.querySelector('#rsc').innerHTML=`<h2>${METRICS.find(m=>m[0]===xk)[1]} vs ${METRICS.find(m=>m[0]===yk)[1]} <span class="r">${n} players</span></h2>`;
    ctrl.querySelector('#rsc').appendChild(scatter(pts,slope,inter,col,METRICS.find(m=>m[0]===xk)[1],METRICS.find(m=>m[0]===yk)[1]));
    const fl=pts.filter(p=>p.flag).sort((a,b)=>Math.abs(b.z)-Math.abs(a.z));
    const rflag=ctrl.querySelector('#rflag'),rpg=ctrl.querySelector('#rflagpg'),rcount=ctrl.querySelector('#rflagn');
    const fper=14,fpages=Math.max(1,Math.ceil(fl.length/fper));let fpage=0;
    rcount.textContent=fl.length?`${fl.length} total`:'';
    function renderFlags(){
      const off=fpage*fper;
      rflag.innerHTML=fl.length?fl.slice(off,off+fper).map((p,i)=>`<div class="flagchip"><span class="row" style="gap:9px"><span class="rank">${off+i+1}</span><a class="plink" data-pid="${p.pid}">${esc(p.name)}</a></span><span class="num ${p.z>0?'pos':'neg'}">${p.z>0?'+':''}${p.z}σ</span></div>`).join(''):'<span class="note">No outliers at this threshold.</span>';
      rpg.innerHTML=fpages>1?`<button class="pv">‹</button><span class="lab">${fpage+1} / ${fpages}</span><button class="nx">›</button>`:'';
      const pv=rpg.querySelector('.pv'),nx=rpg.querySelector('.nx');
      if(pv){pv.disabled=fpage===0;pv.onclick=()=>{if(fpage>0){fpage--;renderFlags();}};}
      if(nx){nx.disabled=fpage>=fpages-1;nx.onclick=()=>{if(fpage<fpages-1){fpage++;renderFlags();}};}
      wirePlinks(rflag);
    }
    renderFlags();
  }
  ctrl.querySelectorAll('select,input').forEach(e=>e.oninput=draw);draw();
}
function scatter(pts,slope,inter,colmode,xl,yl){
  const W=640,H=400,pad=46;const xs=pts.map(p=>p.x),ys=pts.map(p=>p.y);
  const xmin=Math.min(...xs),xmax=Math.max(...xs),ymin=Math.min(...ys),ymax=Math.max(...ys);
  const sx=x=>pad+(x-xmin)/((xmax-xmin)||1)*(W-2*pad),sy=y=>H-pad-(y-ymin)/((ymax-ymin)||1)*(H-2*pad);
  let svg=`<svg viewBox="0 0 ${W} ${H}" width="100%">`;
  for(let i=0;i<=4;i++){const gx=pad+i/4*(W-2*pad),gy=pad+i/4*(H-2*pad);svg+=`<line x1="${gx}" y1="${pad}" x2="${gx}" y2="${H-pad}" stroke="#141C2A"/><line x1="${pad}" y1="${gy}" x2="${W-pad}" y2="${gy}" stroke="#141C2A"/>`;}
  svg+=`<line x1="${sx(xmin)}" y1="${sy(slope*xmin+inter)}" x2="${sx(xmax)}" y2="${sy(slope*xmax+inter)}" stroke="#6FB0FF" stroke-dasharray="5 4" opacity=".7"/>`;
  pts.forEach(p=>{const fill=colmode==='flag'?(p.flag?'#FF6B7E':'#39435a'):(ARCH_COLOR[p.arch]||'#6FB0FF');
    svg+=`<circle class="scatter-pt" cx="${sx(p.x)}" cy="${sy(p.y)}" r="${p.flag?5.5:3.6}" fill="${fill}" opacity="${p.flag?1:.72}" data-n="${esc(p.name).replace(/"/g,'')}" data-x="${p.x}" data-y="${p.y}" data-z="${p.z}" data-pid="${p.pid}"/>`;});
  svg+=`<text x="${W/2}" y="${H-12}" fill="#8492AB" font-size="11" text-anchor="middle">${xl}</text><text x="14" y="${H/2}" fill="#8492AB" font-size="11" text-anchor="middle" transform="rotate(-90 14 ${H/2})">${yl}</text></svg>`;
  const el=$(`<div>${svg}</div>`);
  el.querySelectorAll('.scatter-pt').forEach(ci=>{ci.onmousemove=e=>showTip(`<b>${ci.dataset.n}</b><br>${xl}: ${ci.dataset.x}<br>${yl}: ${ci.dataset.y}<br>resid ${ci.dataset.z}σ`,e.clientX,e.clientY);ci.onmouseleave=hideTip;ci.onclick=()=>{state.player=ci.dataset.pid;render();};});
  return el;
}

function _shrinkRows(c,rows,kind,asc){
  const fmt=c.meta.format,src=kind==='bowl'?(c.bowlers||{}):(c.players||{});
  const vals=rows.map(x=>x.value),mean=vals.reduce((a,b)=>a+b,0)/(vals.length||1);
  return rows.map(x=>{const p=src[x.pid]||{},cr=cred(p,fmt,kind);return Object.assign({},x,{_adj:mean+(x.value-mean)*cr*cr});})
    .sort((a,b)=>asc?a._adj-b._adj:b._adj-a._adj);
}
function recordsView(app){
  const c=cur(),r=c.records,m=c.meta;
  app.appendChild($(`<div><h1>Records &amp; Leaderboards</h1><p class="sub">Top 15 shown, page through the rest at the bottom of each card. Counting stats include everyone; rate stats use the ${m.rate_min_bat}+ ball qualifier.</p></div>`));
  app.appendChild($(`<div class="methnote">${CRED_NOTE}</div>`));
  app.appendChild($(coverageBanner()));
  const lab={most_runs:"Most Runs",most_hundreds:"Most Hundreds",most_fifties:"Most Fifties",most_sixes:"Most Sixes",most_innings:"Most Innings",most_wickets:"Most Wickets",
    highest_avg:"Highest Average",highest_sr:"Highest Strike Rate",best_consistency:"Most Consistent",best_conversion:"Best Conversion %",best_chase_avg:"Best Chase Average",best_death_sr:"Best Death-overs SR",
    highest_era_index:"Best Era-Adjusted Index",best_strike_rotation:"Best Strike Rotation %",best_acceleration:"Best Acceleration Index",best_pressure_sr:"Best Pressure SR (chase)",best_clutch:"Best Clutch Index",
    best_economy:"Best Economy",best_bowl_sr:"Best Bowling SR",best_dot_pct_bowl:"Highest Dot % (bowl)",best_era_index_bowl:"Best Era-Adjusted (bowl)",best_collapse_resist:"Best Collapse Resistance",most_self_reliant:"Most Self-Reliant (partners)"};
  const RATE_BAT=new Set(["highest_avg","highest_sr","best_consistency","best_conversion","best_chase_avg","best_death_sr","highest_era_index","best_strike_rotation","best_acceleration","best_pressure_sr","best_clutch","best_collapse_resist","most_self_reliant"]);
  const RATE_BOWL=new Set(["best_economy","best_bowl_sr","best_dot_pct_bowl","best_era_index_bowl"]);
  const ASC=new Set(["best_economy","best_bowl_sr","most_self_reliant"]);
  const floorB=2*(m.rate_min_bat||60),floorW=2*(m.rate_min_bowl||60);
  function filterRows(k,rows){
    if(RATE_BAT.has(k))return rows.filter(x=>{const p=c.players[x.pid];return p&&p.balls>=floorB;});
    if(RATE_BOWL.has(k))return rows.filter(x=>{const p=c.bowlers[x.pid];return p&&p.balls>=floorW;});

    let rows=filterRows(k,r[k]);
    if(RATE_BAT.has(k)||RATE_BOWL.has(k))rows=_shrinkRows(c,rows,RATE_BOWL.has(k)?'bowl':'bat',ASC.has(k));
    let page=0;const per=15;const pages=Math.ceil(rows.length/per);
    const body=card.querySelector('.body'),lb=card.querySelector('.lab'),pv=card.querySelector('.pv'),nx=card.querySelector('.nx');
    function d(){const off=page*per;body.innerHTML=rows.slice(off,off+per).map((x,i)=>{const rk=off+i+1;return `<div class="ledrow"><span class="row" style="gap:8px"><span class="rank ${rk<=3?'r'+rk:''}">${rk}</span><a class="plink" data-pid="${x.pid}">${esc(x.name)}</a></span><b class="num">${fmtN(x.value)}</b></div>`;}).join('');
      lb.textContent=`${page+1} / ${pages}`;pv.disabled=page===0;nx.disabled=page>=pages-1;wirePlinks(body);}
    pv.onclick=()=>{if(page>0){page--;d();}};nx.onclick=()=>{if(page<pages-1){page++;d();}};d();

async function loadFeed(kind){
  const g = kind==='live' ? window.CIL_LIVE : window.CIL_SCHEDULE;
  if(g) return g;
  if(location.protocol.indexOf('http')===0){
    try{const r=await fetch('/api/'+kind,{cache:'no-store'}); if(r.ok) return await r.json();}catch(e){}
  }
  return null;
}

function _conf(n,hi,mid){return n>=hi?'High':n>=mid?'Medium':'Low';}
function discovery(c){
  const m=c.meta,P=c.players||{},lab=`${gLabel(m)} ${(m.format||'').toUpperCase()}`;
  const B=(k,f,d,need)=>_board(c,k,f,d,need)||[];
  const T=[];let x,p;
  if((x=B('bat','collapse_resist','desc','collapse_balls')[0])&&x.value>105){p=P[x.pid]||{};
    T.push({pid:x.pid,head:`${x.name} barely flinches in a collapse`,body:`Keeps a strike rate <b>${x.value-100}% above their own norm</b> once the innings is 3+ wickets down — the most collapse-proof batter in ${lab}.`,conf:_conf(p.collapse_balls||0,800,300)});}
  if((x=B('bat','pressure_sr','desc')[0])&&x.value>105){p=P[x.pid]||{};
    T.push({pid:x.pid,head:`${x.name} speeds up when it matters most`,body:`Scores <b>${x.value-100}% faster under pressure</b> than in routine passages — the highest pressure strike rate in ${lab}.`,conf:_conf(p.pressure_balls||0,1500,500)});}
  if((x=B('bat','era_index','desc')[0])&&x.value>105){p=P[x.pid]||{};
    T.push({pid:x.pid,head:`${x.name} towers over their era`,body:`Outperforms the typical ${lab} batter of the same period by <b>${x.value-100}%</b> on an era-adjusted basis.`,conf:_conf(p.balls||0,3000,1000)});}
  if((x=B('bat','win_sr_ratio','desc')[0])&&x.value>103)
    T.push({pid:x.pid,head:`${x.name} shows up on the big day`,body:`Lifts strike rate <b>${x.value-100}% in wins</b> versus the rest — the biggest winning-day gear-change in ${lab}.`,conf:'Medium'});
  if((x=B('bat','clutch_index','desc')[0])&&x.value>105)
    T.push({pid:x.pid,head:`${x.name} is the clutch leader of ${lab}`,body:`A clutch index of <b>${x.value}</b> — runs keep flowing precisely as wickets tumble at the other end.`,conf:'High'});
  if((x=B('bat','partner_dep','asc')[0])){p=P[x.pid]||{};if(p.top_partner)
    T.push({pid:x.pid,head:`${x.name} carries the innings alone`,body:`The least partner-dependent batter in ${lab} — only <b>${p.top_partner_share}%</b> of runs came in stands with ${esc(p.top_partner)}.`,conf:'High'});}
  if((x=B('bowl','bowl_sr','asc')[0]))

  const good=T.filter(t=>t.conf!=='Low');const pool=good.length?good:T;return pool.length?pool[Math.floor(Math.random()*pool.length)]:null;
}
function scatterSVG(c){
  const o=c.outliers&&c.outliers.avg_vs_sr;if(!o||!o.points||!o.points.length)return '<div class="note">No data.</div>';

/* ===================== SIMILARITY NETWORK ===================== */
function nearestPeers(c,pid,K){
  const fmt=c.meta.format,P=c.players||{},f=P[pid];if(!f||!f.pct)return [];
  const KEYS=['avg','sr','boundary_pct','dot_pct','strike_rot','conversion','consistency','accel_index','pressure_sr','clutch_index','collapse_resist','partner_dep'];
  const gv=p=>KEYS.map(k=>(p.pct&&p.pct[k]!=null)?p.pct[k]:50),fv=gv(f);
  const _f=(fmt||'').toLowerCase(),minb=_f==='test'?2500:_f==='odi'?1500:500,out=[];
  for(const id in P){if(id===pid)continue;const p=P[id];if(!p.qualified||!p.pct||_isId(p.name)||(p.balls||0)<minb)continue;
    const v=gv(p);let s=0;for(let i=0;i<KEYS.length;i++){const dd=fv[i]-v[i];s+=dd*dd;}
    out.push({pid:id,name:p.name,dist:Math.sqrt(s)});}
  out.sort((a,b)=>a.dist-b.dist);
  return out.slice(0,K||7).map(o=>({pid:o.pid,name:o.name,score:Math.exp(-o.dist/180)}));
}
function _egoNet(c,pid){
  const P=c.players||{},focal=P[pid];if(!focal)return '<div class="note">No data for this player.</div>';
  if(!focal.pct)return '<div class="note">Similarity uses batting profile; this player has no batting percentile data (likely a specialist bowler).</div>';
  const sims=nearestPeers(c,pid,8);
  if(!sims.length)return '<div class="note">No credible peers found in this cohort.</div>';
  const W=720,H=470,cx=W/2,cy=H/2,R=162;
  const scs=sims.map(s=>s.score),smin=Math.min(...scs),smax=Math.max(...scs);
  let edges='',nodes='';
  sims.forEach((s,i)=>{const a=(i/sims.length)*2*Math.PI-Math.PI/2,x=cx+R*Math.cos(a),y=cy+R*Math.sin(a);
    const t=(s.score-smin)/((smax-smin)||1),wdt=(1.2+t*3).toFixed(1);
    edges+=`<line x1="${cx}" y1="${cy}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}" stroke="#3D8BFF" stroke-opacity="${(0.25+t*0.5).toFixed(2)}" stroke-width="${wdt}"/>`;
    const col=ARCH_COLOR[(P[s.pid]||{}).archetype]||'#6FB0FF';
    nodes+=`<g class="netn" data-pid="${s.pid}" style="cursor:pointer"><circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="17" fill="${col}" fill-opacity=".9"/><text x="${x.toFixed(1)}" y="${(y+30).toFixed(1)}" text-anchor="middle" fill="#ECF2FC" font-size="10.5" font-weight="600">${esc(s.name)}</text><text x="${x.toFixed(1)}" y="${(y+42).toFixed(1)}" text-anchor="middle" fill="#5A6884" font-size="8.5">${Math.round(s.score*100)}% similar</text></g>`;});
  const fcol=ARCH_COLOR[focal.archetype]||'#9B7BFF';
  nodes+=`<g><circle cx="${cx}" cy="${cy}" r="30" fill="${fcol}"/><circle cx="${cx}" cy="${cy}" r="30" fill="none" stroke="#fff" stroke-opacity=".5"/><text x="${cx}" y="${cy+50}" text-anchor="middle" fill="#fff" font-size="13" font-weight="760">${esc(focal.name)}</text></g>`;
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">${edges}${nodes}</svg>`;
}

function networkView(app){
  const c=cur(),P=c.players||{};
  const bats=Object.entries(P).filter(([id,p])=>p.qualified&&p.pct).sort((a,b)=>(b[1].runs||0)-(a[1].runs||0));
  if(!bats.length){app.appendChild($('<div><h1>Similarity Network</h1></div>'));app.appendChild($('<div class="cov">No batting profile data in this cohort.</div>'));return;}
  if(!state.netPlayer||!P[state.netPlayer]||!P[state.netPlayer].pct)state.netPlayer=bats[0][0];
  app.appendChild($(`<div><h1>Similarity Network</h1><p class="sub">Each batter linked to their nearest statistical peers across 12 percentile metrics — restricted to players with a credible sample, so associate small-samples don't pollute the map. Search a batter or click a node to re-centre.</p></div>`));
  const names=bats.map(([id,p])=>p.name),nameToId={};bats.forEach(([id,p])=>{if(!(p.name in nameToId))nameToId[p.name]=id;});
  const bar=$(`<div class="swrap2 ac" style="position:relative;z-index:40;max-width:360px;margin:2px 0 14px"><input id="netq" placeholder="Search any batter…" autocomplete="off" style="background:transparent;border:none;outline:none;color:var(--ink);padding:9px 4px;font-size:12.5px;width:100%"/><div class="aclist" style="display:none"></div></div>`);
  app.appendChild(bar);
  const panel=$(`<div class="panel">${_egoNet(c,state.netPlayer)}</div>`);
  app.appendChild(panel);
  autocomplete(bar.querySelector('#netq'),names,(nm)=>{if(nm&&nameToId[nm]){state.netPlayer=nameToId[nm];render();}});
  panel.querySelectorAll('.netn').forEach(g=>g.onclick=()=>{state.netPlayer=g.getAttribute('data-pid');render();});
}
/* ===================== CAREER TIMELINE (serve.py /api/career over cil.db) ===================== */
function careerSVG(years){
  const W=720,H=210,pad=36,n=years.length;
  const mx=Math.max(...years.map(y=>y.runs||0),1),gap=(W-2*pad)/n,bw=Math.min(34,gap*0.66);
  const peak=years.reduce((a,b)=>(b.runs||0)>(a.runs||0)?b:a,years[0]);
  const bars=years.map((y,i)=>{const x=pad+i*gap+(gap-bw)/2,h=(y.runs/mx)*(H-2*pad-14),yy=H-pad-h,pk=y.year===peak.year;
    return `<g><rect x="${x.toFixed(1)}" y="${yy.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(1,h).toFixed(1)}" rx="2" fill="${pk?'#FFB454':'#3D8BFF'}" fill-opacity="${pk?0.95:0.62}"><title>${y.year}: ${y.runs} runs in ${y.inns} inns · avg ${y.avg} · SR ${y.sr}</title></rect>${n<=24?`<text x="${(x+bw/2).toFixed(1)}" y="${H-pad+13}" text-anchor="middle" fill="#5A6884" font-size="8.5">'${String(y.year).slice(2)}</text>`:''}</g>`;}).join('');
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block"><line x1="${pad}" y1="${H-pad}" x2="${W-pad}" y2="${H-pad}" stroke="#2C3A50"/>${bars}<text x="${pad}" y="18" fill="#8492AB" font-size="10">Peak ${peak.year}: ${peak.runs} runs</text></svg>`;
}
function mountCareer(app,pid){
  if(location.protocol.indexOf('http')!==0)return;
  const w=app.firstElementChild;if(!w)return;
  const panel=document.createElement('div');panel.className='panel';panel.style.marginTop='13px';
  panel.innerHTML='<h2>Career timeline <span class="r">loading…</span></h2>';
  if(w.children.length>1)w.insertBefore(panel,w.children[1]);else w.appendChild(panel);
  fetch('/api/career?pid='+encodeURIComponent(pid),{cache:'no-store'}).then(r=>r.ok?r.json():null).then(d=>{
    if(!d||!d.years||!d.years.length){panel.remove();return;}
    panel.innerHTML='<h2>Career timeline <span class="r">runs per year · gold = peak</span></h2>'+careerSVG(d.years);
  }).catch(()=>panel.remove());
}

init();
