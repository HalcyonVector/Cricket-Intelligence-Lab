# Full local stack. Run from repo root:
#   docker compose -f infra/docker-compose.full.yml up --build
#
# - db   : Postgres with the production star schema loaded (raw/core/marts)
# - api  : FastAPI in zero-DB mode, serving the JSON bundles from web/data/
#          (run `python build_all.py` first so web/data/*.json exist)
# - web  : Next.js frontend
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: cil
      POSTGRES_PASSWORD: cil
      POSTGRES_DB: cil
    ports: ["5432:5432"]
    volumes:
      - cil_pg:/var/lib/postgresql/data
      - ../db/schema:/docker-entrypoint-initdb.d:ro

  api:
    build: { context: .., dockerfile: services/api/Dockerfile }
    environment:
      DATABASE_URL: postgresql://cil:cil@db:5432/cil
    ports: ["8000:8000"]
    volumes:
      - ../web/data:/app/web/data:ro
    depends_on: [db]

  web:
    build: { context: ../apps/web, dockerfile: Dockerfile }
    environment:
      NEXT_PUBLIC_API: http://localhost:8000
    ports: ["3000:3000"]
    depends_on: [api]

volumes:
  cil_pg:
