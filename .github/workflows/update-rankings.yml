# #2 — Auto-refresh the ICC Rankings tab on a schedule. Free on GitHub Actions.
name: Update ICC rankings

on:
  schedule:
    - cron: "0 6 * * 1"   # every Monday 06:00 UTC
  workflow_dispatch: {}    # plus a manual "Run workflow" button

permissions:
  contents: write          # lets the job commit the refreshed rankings.js

jobs:
  rankings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Playwright + Chromium
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium
      - name: Scrape ICC rankings
        # --debug dumps the rendered HTML of any page that parses badly, so a
        # failure leaves something to inspect. The script exits non-zero (turning
        # this job RED + emailing you) if ICC's markup change breaks the scrape.
        run: python scripts/fetch_icc_rankings.py --debug
      - name: Upload rendered HTML of failed pages
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: icc-debug-html
          path: scripts/_debug_*.html
          if-no-files-found: ignore
          retention-days: 14
      - name: Commit if changed
        if: success()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/dashboard/rankings.js
          git diff --cached --quiet || git commit -m "Auto-update ICC rankings"
          git push
